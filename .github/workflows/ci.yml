name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel duplicate runs on the same PR/branch — saves CI minutes when
# pushing several commits in quick succession.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck and build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build
        # Dummy env vars are enough for `next build` — the real values are
        # only read at request time. Using fakes keeps real secrets out of
        # CI and avoids needing to wire up GitHub Secrets for every fork.
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://ci-placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
        run: npm run build
